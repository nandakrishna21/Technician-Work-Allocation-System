services:
  - type: web
    name: technician-work-allocation-backend
    env: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 5000

  - type: web
    name: technician-work-allocation-frontend
    env: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://technician-work-allocation-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /api/*
        destination: https://technician-work-allocation-backend.onrender.com/api/:splat
