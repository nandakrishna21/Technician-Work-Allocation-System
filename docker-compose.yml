services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    ports:
      - "5000:5000"
    environment:
      - JWT_SECRET=${JWT_SECRET:-change-this-to-a-random-secret}
      - PORT=5000
    volumes:
      - backend_data:/app/backend/uploads
      - backend_db:/app/backend
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:
  backend_db:
